<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bridge</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}
#lock-wall{
  margin-top:20px;
}
.lock{
  border:1px solid #444;
  padding:10px;
  margin:10px;
  cursor:pointer;
}
textarea{
  width:80%;
  height:80px;
}
button{
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🌉 The Bridge</h1>

<textarea id="msg-input" placeholder="Write something..."></textarea><br>
<button onclick="hangLock()">Post</button>

<div id="lock-wall"></div>

<hr>

<div id="view" style="display:none;">
  <h3>Message</h3>
  <p id="view-msg"></p>

  <textarea id="reply-input" placeholder="Reply..."></textarea><br>
  <button onclick="sendReply()">Send Reply</button>

  <div id="replies"></div>
</div>

<script>
const SUPA_URL='https://ysmuutnvtumkrjbzytla.supabase.co';
const SUPA_KEY='PASTE_YOUR_KEY_HERE';

const db=supabase.createClient(SUPA_URL,SUPA_KEY);

let currentId=null;

// Load locks
async function loadLocks(){
  const { data } = await db.from('locks').select('*').order('time',{ascending:false});
  const wall=document.getElementById('lock-wall');
  wall.innerHTML='';
  (data||[]).forEach(l=>{
    const div=document.createElement('div');
    div.className='lock';
    div.innerText=l.msg;
    div.onclick=()=>openLock(l);
    wall.appendChild(div);
  });
}

// Post lock
async function hangLock(){

  const msg=document.getElementById('msg-input').value.trim();

  const last=localStorage.getItem('lastPostTime');
  if(last && Date.now()-last<5000){
    alert("Wait 5 sec");
    return;
  }

  if(!msg){
    alert("Write something");
    return;
  }

  const { error } = await db.from('locks').insert([{msg}]);

  if(error){
    alert("Error");
    return;
  }

  localStorage.setItem('lastPostTime',Date.now());

  document.getElementById('msg-input').value='';
  loadLocks();
}

// Open lock
function openLock(lock){
  currentId=lock.id;
  document.getElementById('view').style.display='block';
  document.getElementById('view-msg').innerText=lock.msg;
  loadReplies(lock.id);
}

// Load replies
async function loadReplies(id){
  const { data } = await db.from('replies').select('*').eq('lock_id',id);
  const box=document.getElementById('replies');
  box.innerHTML='';
  (data||[]).forEach(r=>{
    const d=document.createElement('div');
    d.innerText=r.msg;
    box.appendChild(d);
  });
}

// Send reply
async function sendReply(){
  const msg=document.getElementById('reply-input').value.trim();
  if(!msg || !currentId) return;

  const { error } = await db.from('replies').insert([{lock_id:currentId,msg}]);

  if(error){
    alert("Reply error");
    return;
  }

  document.getElementById('reply-input').value='';
  loadReplies(currentId);
}

// Init
loadLocks();
</script>
</body>
</html>
